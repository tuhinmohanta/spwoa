<!-- Alternative Option 1: Minimalist "T" with Platform Layers -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .primary { fill: #c9a96e; }
      .secondary { fill: #8a7a5e; opacity: 0.5; }
      .bg { fill: #1a1a1f; }
      @media (prefers-color-scheme: light) {
        .primary { fill: #2a2a2f; }
        .secondary { fill: #4a4a4f; opacity: 0.4; }
        .bg { fill: #ffffff; }
      }
    </style>
  </defs>
  
  <rect class="bg" width="100" height="100" rx="20"/>
  
  <!-- Layered platform bars representing tech stack -->
  <rect class="secondary" x="20" y="65" width="60" height="4" rx="2"/>
  <rect class="secondary" x="25" y="72" width="50" height="4" rx="2"/>
  <rect class="secondary" x="30" y="79" width="40" height="4" rx="2"/>
  
  <!-- Bold T -->
  <path class="primary" d="M 25 20 L 75 20 L 75 30 L 58 30 L 58 60 L 42 60 L 42 30 L 25 30 Z"/>
</svg>

<!-- Alternative Option 2: Geometric Tech Symbol -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .accent { fill: none; stroke: #c9a96e; stroke-width: 6; stroke-linecap: round; }
      .bg { fill: #1a1a1f; }
      @media (prefers-color-scheme: light) {
        .accent { stroke: #2a2a2f; }
        .bg { fill: #ffffff; }
      }
    </style>
  </defs>
  
  <rect class="bg" width="100" height="100" rx="20"/>
  
  <!-- Abstract tech/platform symbol -->
  <path class="accent" d="M 30 35 L 50 25 L 70 35"/>
  <path class="accent" d="M 30 50 L 50 40 L 70 50"/>
  <path class="accent" d="M 30 65 L 50 55 L 70 65"/>
  <line class="accent" x1="50" y1="25" x2="50" y2="75"/>
</svg>

<!-- Alternative Option 3: Elegant "T" in Circle -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .circle { fill: none; stroke: #c9a96e; stroke-width: 3; }
      .letter { fill: #c9a96e; }
      .bg { fill: #1a1a1f; }
      @media (prefers-color-scheme: light) {
        .circle { stroke: #2a2a2f; }
        .letter { fill: #2a2a2f; }
        .bg { fill: #ffffff; }
      }
    </style>
  </defs>
  
  <rect class="bg" width="100" height="100" rx="20"/>
  <circle class="circle" cx="50" cy="50" r="32"/>
  
  <!-- Serif-style T -->
  <path class="letter" d="M 35 32 L 65 32 L 65 38 L 55 38 L 55 68 L 45 68 L 45 38 L 35 38 Z"/>
</svg>
