<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .bg { fill: #1a1a1f; }
      .text { fill: #c9a96e; }
      @media (prefers-color-scheme: light) {
        .bg { fill: #ffffff; }
        .text { fill: #2a2a2f; }
      }
    </style>
  </defs>
  
  <!-- Background with subtle border -->
  <rect class="bg" width="100" height="100" rx="20"/>
  
  <!-- TM Monogram -->
  <g class="text">
    <!-- T -->
    <path d="M 20 25 L 45 25 L 45 32 L 37 32 L 37 75 L 28 75 L 28 32 L 20 32 Z"/>
    
    <!-- M -->
    <path d="M 50 25 L 60 25 L 67.5 45 L 75 25 L 85 25 L 85 75 L 77 75 L 77 40 L 70 58 L 65 58 L 58 40 L 58 75 L 50 75 Z"/>
  </g>
</svg>
